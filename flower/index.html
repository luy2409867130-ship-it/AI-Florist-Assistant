<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI花店助手 - 登录</title>
    <link rel="stylesheet" href="styles/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-wrapper">
            <div class="brand-section">
                <div class="brand-icon">
                    <svg viewBox="0 0 100 100" class="flower-icon">
                        <circle cx="50" cy="50" r="8" fill="#FF6B8A"/>
                        <ellipse cx="50" cy="25" rx="12" ry="20" fill="#FFB6C1"/>
                        <ellipse cx="50" cy="75" rx="12" ry="20" fill="#FFB6C1"/>
                        <ellipse cx="25" cy="50" rx="20" ry="12" fill="#FFB6C1"/>
                        <ellipse cx="75" cy="50" rx="20" ry="12" fill="#FFB6C1"/>
                        <ellipse cx="30" cy="30" rx="15" ry="18" fill="#FFC0CB" transform="rotate(-45 30 30)"/>
                        <ellipse cx="70" cy="30" rx="15" ry="18" fill="#FFC0CB" transform="rotate(45 70 30)"/>
                        <ellipse cx="30" cy="70" rx="15" ry="18" fill="#FFC0CB" transform="rotate(45 30 70)"/>
                        <ellipse cx="70" cy="70" rx="15" ry="18" fill="#FFC0CB" transform="rotate(-45 70 70)"/>
                    </svg>
                </div>
                <h1 class="brand-title">AI花店助手</h1>
                <p class="brand-subtitle">智能助力，让每一束鲜花都绽放光彩</p>
            </div>

            <form id="loginForm" class="login-form" novalidate>
                <div class="form-group">
                    <label for="username" class="form-label">用户名/手机号</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            class="form-input"
                            placeholder="请输入用户名或手机号"
                            required
                        />
                    </div>
                    <span class="error-message" id="usernameError"></span>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">密码</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="form-input"
                            placeholder="请输入密码"
                            required
                        />
                        <button 
                            type="button" 
                            class="toggle-password" 
                            id="togglePassword"
                            aria-label="切换密码显示"
                        >
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/>
                                <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7"/>
                            </svg>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-text">记住我</span>
                    </label>
                    <a href="#" class="forgot-password" id="forgotPassword">忘记密码？</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span>登 录</span>
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </form>

            <div class="form-footer">
                <p>还没有账号？<a href="#" class="register-link">立即注册</a></p>
            </div>

            <div class="social-login">
                <div class="divider">
                    <span>或</span>
                </div>
                <div class="social-buttons">
                    <button class="social-btn" id="wechatLogin">
                        <svg viewBox="0 0 24 24" fill="#07C160">
                            <path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 01.213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 00.167-.054l1.903-1.114a.864.864 0 01.717-.098 10.16 10.16 0 002.837.403c4.801 0 8.692-3.287 8.692-7.342 0-4.054-3.891-7.339-8.692-7.339z"/>
                        </svg>
                        <span>微信登录</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="bg-decoration">
        <div class="flower-bg flower-1"></div>
        <div class="flower-bg flower-2"></div>
        <div class="flower-bg flower-3"></div>
        <div class="flower-bg flower-4"></div>
        <div class="flower-bg flower-5"></div>
    </div>

    <script src="scripts/login.js"></script>
</body>
</html>
